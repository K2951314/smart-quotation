<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f7f3ec">
<title>智能询价系统</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div id="toast" class="toast" role="status" aria-live="polite">已复制</div>

<div class="shell">
  <header class="masthead">
    <div class="masthead-main">
      <div class="brand-line">
        <h1>智能询价系统</h1>
        <div id="status" class="status-badge info">等待数据...</div>
      </div>
      <div id="versions" class="version-bar">价格版本: - | 库存版本: -</div>
    </div>
  </header>

  <section class="toolbar" aria-label="查询控制台">
    <div class="toolbar-actions">
      <button id="btnSearch" class="btn btn-search" type="button">智能查询</button>
      <button id="btnRegexConvert" class="btn btn-regex" type="button">库存查询</button>
      <button id="btnMmc" class="btn btn-mmc" type="button">三菱库存</button>
      <button id="btnCopy" class="btn btn-copy" type="button">复制勾选</button>
    </div>

    <div class="toolbar-main">
      <div class="field-group field-group-large">
        <label for="discountStep">折扣步长</label>
        <div class="field-shell">
          <input type="number" id="discountStep" value="0.1" step="0.1" min="0.1" inputmode="decimal">
          <span class="field-unit">百分点</span>
        </div>
      </div>

      <div class="field-group">
        <label for="decimals">小数位数</label>
        <div class="field-shell">
          <input type="number" id="decimals" value="1" step="1" min="0" inputmode="numeric">
        </div>
      </div>

      <div class="field-group">
        <label for="threshold">取整阈值</label>
        <div class="field-shell">
          <input type="number" id="threshold" value="100" step="1" min="0" inputmode="numeric">
        </div>
      </div>
      </div>

      <div class="toolbar-secondary">
        <div class="toolbar-secondary-main">
          <div class="toolbar-control-band">
            <div id="stepPresetControls" class="step-presets toolbar-step-presets">
              <button id="btnDefaultDiscounts" type="button" class="step-preset step-preset-action">配置</button>
            </div>
          </div>

        <div class="result-controls-band">
          <select id="roundingMethod" class="rounding-select">
            <option value="ceil">向上取整</option>
            <option value="round">四舍五入</option>
            <option value="floor">向下取整</option>
          </select>
          <div class="result-stat"><strong id="resultCount">0</strong>结果</div>
          <label class="select-all-toggle"><input id="toggleAllResults" type="checkbox">全选</label>
          <label class="opt-lbl"><input id="chkUntaxedQuote" type="checkbox">未税</label>
        </div>

        <div id="copyColumnControls" class="toolbar-copy toolbar-copy-inline"></div>
      </div>
    </div>
  </section>

  <main class="workspace">
    <section class="query-panel">
      <div class="section-head section-head-compact section-head-inline">
        <h2>输入</h2>
      </div>
      <textarea id="queryInput" class="query-input" placeholder="请输入规格型号...&#10;支持多关键词，例如：&#10;WNMG080408 UC5115"></textarea>
      <div class="query-note query-note-inline">
        <span>勾选项自动置顶</span>
      </div>
    </section>

    <section class="result-panel">
      <div class="result-panel-header">
        <div class="section-head section-head-compact section-head-inline">
          <h2>结果</h2>
        </div>
      </div>

      <div class="results-shell">
        <div id="resultBody" class="result-list" aria-live="polite"></div>
      </div>
    </section>
  </main>
</div>

<div id="defaultDiscountModal" class="discount-config-modal" hidden>
    <div id="defaultDiscountBackdrop" class="discount-config-backdrop"></div>
  <section class="discount-config-card" role="dialog" aria-modal="true" aria-labelledby="defaultDiscountTitle">
    <div class="discount-config-head">
      <div>
        <p class="discount-config-kicker">Default Discount</p>
        <h2 id="defaultDiscountTitle">默认折扣设置</h2>
      </div>
      <button id="btnCloseDefaultDiscounts" type="button" class="discount-config-close" aria-label="关闭">×</button>
    </div>

    <p class="discount-config-copy">按品牌或活动设置默认折扣。保存后，新查询结果会自动套用，未手动改过折扣的当前结果也会同步更新。</p>

    <div class="discount-config-grid">
      <!-- 动态渲染：由 app.js 的 buildDefaultDiscountForm() 根据 discount_rules 生成输入框 -->
      <!-- 兜底隐藏输入（旧版兼容，当 JS 动态渲染失败时回退） -->
      <label class="discount-config-field" for="defaultDiscountEx" hidden>
        <span>EX</span>
        <div class="field-shell">
          <input type="number" id="defaultDiscountEx" min="0" max="100" step="0.1" inputmode="decimal">
          <span class="field-unit">%</span>
        </div>
      </label>
      <label class="discount-config-field" for="defaultDiscountOsg" hidden>
        <span>OSG</span>
        <div class="field-shell">
          <input type="number" id="defaultDiscountOsg" min="0" max="100" step="0.1" inputmode="decimal">
          <span class="field-unit">%</span>
        </div>
      </label>
      <label class="discount-config-field" for="defaultDiscountMitsubishi" hidden>
        <span>三菱</span>
        <div class="field-shell">
          <input type="number" id="defaultDiscountMitsubishi" min="0" max="100" step="0.1" inputmode="decimal">
          <span class="field-unit">%</span>
        </div>
      </label>
      <label class="discount-config-field" for="defaultDiscountOther" hidden>
        <span>其他</span>
        <div class="field-shell">
          <input type="number" id="defaultDiscountOther" min="0" max="100" step="0.1" inputmode="decimal">
          <span class="field-unit">%</span>
        </div>
      </label>
    </div>

    <div class="discount-config-actions">
      <button id="btnResetDefaultDiscounts" type="button" class="btn btn-ghost">恢复默认</button>
      <button id="btnCancelDefaultDiscounts" type="button" class="btn btn-ghost">取消</button>
      <button id="btnSaveDefaultDiscounts" type="button" class="btn btn-search">保存</button>
    </div>
  </section>
</div>

<button id="btnBackToTop" class="mobile-back-top" type="button">回到顶部</button>

<script src="./lib/query-regex.js?v=4"></script>
<script src="./lib/discount-utils.js?v=4"></script>
<script src="./lib/result-sort.js?v=4"></script>
<script src="./lib/config-core.js?v=4"></script>
<script src="./app.js?v=5"></script>
</body>
</html>
