<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f7f3ec">
<title>智能询价系统</title>
<link rel="stylesheet" href="./styles.css">
<style>
  /* ═══ 登录门禁覆盖层（公司账号视图）═══════════════════════════════════ */
  .auth-gate {
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(135deg, #f7f3ec 0%, #efe6d4 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .auth-gate.hidden { display: none; }
  .auth-gate-box {
    background: #fff; padding: 40px 36px; border-radius: 16px;
    box-shadow: 0 24px 60px -20px rgba(78,61,35,0.25);
    border: 1px solid rgba(94,78,54,0.14);
    min-width: 360px; max-width: 420px;
  }
  .auth-gate-box h1 { margin: 0 0 6px; font-size: 22px; }
  .auth-gate-box .auth-sub { margin: 0 0 24px; color: #7d8791; font-size: 13px; }
  .auth-gate-box .field-group { margin-bottom: 14px; }
  .auth-gate-box .field-group label { display: block; font-size: 12px; font-weight: 500; color: #5b6773; margin-bottom: 4px; }
  .auth-gate-box .field-shell { display: flex; align-items: center; border: 1px solid rgba(94,78,54,0.2); border-radius: 8px; background: #fffaf2; padding: 0 12px; }
  .auth-gate-box .field-shell input { flex: 1; border: none; background: transparent; padding: 10px 0; font-size: 14px; outline: none; }
  .auth-gate-box .auth-btn { width: 100%; padding: 12px; margin-top: 8px; background: #0f766e; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .auth-gate-box .auth-btn:hover { background: #0c5d57; }
  .auth-gate-box .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-gate-box .auth-error { color: #a54f44; font-size: 13px; text-align: center; margin-top: 12px; min-height: 18px; }

  /* 公司账号视图：隐藏折扣步长/默认折扣配置/三菱库存按钮 */
  body.is-customer-company .toolbar-discount-controls,
  body.is-customer-company .toolbar-discount-config,
  body.is-customer-company #btnDefaultDiscounts,
  body.is-customer-company #btnMmc { display: none !important; }

  /* 顶部用户信息条 */
  .customer-info-bar {
    position: fixed; top: 12px; right: 16px; z-index: 100;
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.96); border: 1px solid rgba(94,78,54,0.14);
    border-radius: 8px; padding: 6px 12px; font-size: 13px; box-shadow: 0 6px 18px -10px rgba(0,0,0,0.12);
  }
  .customer-info-bar.is-hidden { display: none; }
  .customer-info-bar strong { color: #24303a; }
  .customer-info-bar .role-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .customer-info-bar .role-badge.admin { background: rgba(15,118,110,0.1); color: #0f766e; }
  .customer-info-bar .role-badge.company { background: rgba(214,188,142,0.3); color: #986d17; }
  .customer-info-bar .customer-logout { padding: 4px 10px; background: transparent; border: 1px solid rgba(94,78,54,0.2); border-radius: 6px; color: #5b6773; font-size: 12px; cursor: pointer; }
  .customer-info-bar .customer-logout:hover { border-color: #a54f44; color: #a54f44; }

  /* 公司账号：含税/未税切换 + 利润控件（紧贴用户信息条下方） */
  .customer-controls {
    position: fixed; top: 56px; right: 16px; z-index: 100;
    display: none; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.96); border: 1px solid rgba(94,78,54,0.14);
    border-radius: 8px; padding: 6px 10px; font-size: 12px; box-shadow: 0 6px 18px -10px rgba(0,0,0,0.12);
  }
  body.is-customer-company .customer-controls { display: flex; }
  .customer-controls label { color: #5b6773; }
  .customer-controls select, .customer-controls input {
    padding: 4px 8px; border: 1px solid rgba(94,78,54,0.2); border-radius: 6px; background: #fffaf2; font-size: 12px; min-width: 60px;
  }
  .customer-controls .tax-toggle { padding: 4px 10px; border: 1px solid rgba(94,78,54,0.2); border-radius: 6px; cursor: pointer; user-select: none; }
  .customer-controls .tax-toggle.active { background: rgba(15,118,110,0.1); border-color: #0f766e; color: #0f766e; font-weight: 600; }
</style>
</head>
<body>

<!-- ═══ 登录门禁覆盖层（未登录时显示） ═══ -->
<div id="authGate" class="auth-gate">
  <div class="auth-gate-box">
    <h1>智能询价系统</h1>
    <p class="auth-sub">登录后查看专属报价</p>
    <form id="authForm" autocomplete="on">
      <div class="field-group">
        <label for="authCompany">公司代码</label>
        <div class="field-shell"><select id="authCompany" autocomplete="organization" required><option value="">加载中…</option></select></div>
      </div>
      <div class="field-group">
        <label for="authUser">用户名</label>
        <div class="field-shell"><input id="authUser" type="text" autocomplete="username" required></div>
      </div>
      <div class="field-group">
        <label for="authPass">密码</label>
        <div class="field-shell"><input id="authPass" type="password" autocomplete="current-password" required></div>
      </div>
      <button type="submit" class="auth-btn" id="authBtn">登录</button>
      <div class="auth-error" id="authError"></div>
    </form>
  </div>
</div>

<!-- ═══ 顶部用户信息条（已登录时显示） ═══ -->
<div id="customerInfoBar" class="customer-info-bar is-hidden">
  <span class="role-badge" id="customerRoleBadge">—</span>
  <strong id="customerName">—</strong>
  <button type="button" class="customer-logout" id="customerLogoutBtn">退出</button>
</div>

<!-- ═══ 公司账号：含税/未税切换 + 利润控件 ═══ -->
<div id="customerControls" class="customer-controls">
  <div class="tax-toggle" id="taxToggle"><span id="taxToggleLabel">含税</span></div>
  <label>利润</label>
  <select id="profitMode">
    <option value="none">无</option>
    <option value="percent">%</option>
    <option value="amount">+</option>
  </select>
  <input id="profitValue" type="number" step="0.01" min="0" value="0" style="width:60px;">
</div>
<div id="toast" class="toast" role="status" aria-live="polite">已复制</div>

<div class="shell">
  <header class="masthead">
    <div class="masthead-main">
      <div class="brand-line">
        <h1>智能询价系统</h1>
        <div id="status" class="status-badge info">等待数据...</div>
      </div>
      <div id="versions" class="version-bar">价格版本: - | 库存版本: -</div>
    </div>
  </header>

  <section class="toolbar" aria-label="查询控制台">
    <div class="toolbar-actions">
      <button id="btnSearch" class="btn btn-search" type="button">智能查询</button>
      <button id="btnRegexConvert" class="btn btn-regex" type="button">库存查询</button>
      <button id="btnMmc" class="btn btn-mmc" type="button">三菱库存</button>
      <button id="btnCopy" class="btn btn-copy" type="button">复制勾选</button>
    </div>

    <div class="toolbar-main">
      <div class="field-group field-group-large">
        <label for="discountStep">折扣步长</label>
        <div class="field-shell">
          <input type="number" id="discountStep" value="0.1" step="0.1" min="0.1" inputmode="decimal">
          <span class="field-unit">百分点</span>
        </div>
      </div>

      <div class="field-group">
        <label for="decimals">小数位数</label>
        <div class="field-shell">
          <input type="number" id="decimals" value="1" step="1" min="0" inputmode="numeric">
        </div>
      </div>

      <div class="field-group">
        <label for="threshold">取整阈值</label>
        <div class="field-shell">
          <input type="number" id="threshold" value="100" step="1" min="0" inputmode="numeric">
        </div>
      </div>
    </div>

    <div class="toolbar-secondary">
      <div class="toolbar-secondary-main">
        <div class="toolbar-control-band">
          <div id="stepPresetControls" class="step-presets toolbar-step-presets">
            <button id="btnDefaultDiscounts" type="button" class="step-preset step-preset-action">配置</button>
            <div class="result-stat"><strong id="resultCount">0</strong><span>结果</span></div>
            <label class="select-all-toggle">
              <input id="toggleAllResults" type="checkbox">
              <span>全选</span>
            </label>
          </div>
        </div>

        <div id="copyColumnControls" class="toolbar-copy toolbar-copy-inline"></div>
      </div>
    </div>
  </section>

  <main class="workspace">
    <section class="query-panel">
      <div class="section-head section-head-compact section-head-inline">
        <h2>输入</h2>
      </div>
      <textarea id="queryInput" class="query-input" placeholder="请输入规格型号...&#10;支持多关键词，例如：&#10;WNMG080408 UC5115"></textarea>
      <div class="query-note query-note-inline">
        <span>勾选项自动置顶</span>
      </div>
    </section>

    <section class="result-panel">
      <div class="result-panel-header">
        <div class="section-head section-head-compact section-head-inline">
          <h2>结果</h2>
        </div>
      </div>

      <div class="results-shell">
        <div id="resultBody" class="result-list" aria-live="polite"></div>
      </div>
    </section>
  </main>
</div>

<div id="defaultDiscountModal" class="discount-config-modal" hidden>
    <div id="defaultDiscountBackdrop" class="discount-config-backdrop"></div>
  <section class="discount-config-card" role="dialog" aria-modal="true" aria-labelledby="defaultDiscountTitle">
    <div class="discount-config-head">
      <div>
        <p class="discount-config-kicker">Default Discount</p>
        <h2 id="defaultDiscountTitle">默认折扣设置</h2>
      </div>
      <button id="btnCloseDefaultDiscounts" type="button" class="discount-config-close" aria-label="关闭">×</button>
    </div>

    <p class="discount-config-copy">按品牌或活动设置默认折扣。保存后，新查询结果会自动套用，未手动改过折扣的当前结果也会同步更新。</p>

    <div class="discount-config-grid">
      <label class="discount-config-field" for="defaultDiscountEx">
        <span>EX</span>
        <div class="field-shell">
          <input type="number" id="defaultDiscountEx" min="0" max="100" step="0.1" inputmode="decimal">
          <span class="field-unit">%</span>
        </div>
      </label>
      <label class="discount-config-field" for="defaultDiscountOsg">
        <span>OSG</span>
        <div class="field-shell">
          <input type="number" id="defaultDiscountOsg" min="0" max="100" step="0.1" inputmode="decimal">
          <span class="field-unit">%</span>
        </div>
      </label>
      <label class="discount-config-field" for="defaultDiscountMitsubishi">
        <span>三菱</span>
        <div class="field-shell">
          <input type="number" id="defaultDiscountMitsubishi" min="0" max="100" step="0.1" inputmode="decimal">
          <span class="field-unit">%</span>
        </div>
      </label>
      <label class="discount-config-field" for="defaultDiscountOther">
        <span>其他</span>
        <div class="field-shell">
          <input type="number" id="defaultDiscountOther" min="0" max="100" step="0.1" inputmode="decimal">
          <span class="field-unit">%</span>
        </div>
      </label>
    </div>

    <div class="discount-config-actions">
      <button id="btnResetDefaultDiscounts" type="button" class="btn btn-ghost">恢复默认</button>
      <button id="btnCancelDefaultDiscounts" type="button" class="btn btn-ghost">取消</button>
      <button id="btnSaveDefaultDiscounts" type="button" class="btn btn-search">保存</button>
    </div>
  </section>
</div>

<button id="btnBackToTop" class="mobile-back-top" type="button">回到顶部</button>

<!-- 把绝对路径改成相对路径，确保前面有 ./ -->
<script src="./lib/query-regex.js?v=4"></script>
<script src="./lib/discount-utils.js?v=4"></script>
<script src="./lib/result-sort.js?v=4"></script>
<script src="./lib/config-core.js?v=4"></script>
<!-- 干干净净的主程序 -->
<script src="./app.js?v=4"></script>
</body>
</html>
