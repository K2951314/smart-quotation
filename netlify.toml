[build]
publish = "apps"
command = ""

# 安全响应头。部署客户门户前需在 connect-src 中添加后端地址:
#   Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src https://*.supabase.co https://YOUR_BACKEND.onrender.com; img-src 'self' data:; font-src 'self'"
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src https://*.supabase.co; img-src 'self' data:; font-src 'self'"
