# publish 和 command 留空，由 Netlify 网页配置决定
# 客户报价台：publish = "apps"
# 管理后台：publish = "admin"
# [build]
# publish = "apps"
# command = ""

# 安全响应头。
# CSP 说明：
# - script-src 允许 'self' + sheetjs CDN（Excel 解析库）+ sentry CDN（错误监控，按需加载）
# - connect-src 使用 https: 通配以支持动态后端地址（Railway/Render 等）
# - 后端 API 地址通过前端 getApiBase() 动态探测，CSP 无法在构建时确定具体域名，
#   因此放开所有 HTTPS（仍阻止 HTTP 明文连接）
# - Supabase Storage 的 HTTPS 地址也由此规则覆盖
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "no-referrer"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdn.sheetjs.com https://browser.sentry-cdn.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https:; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'"

# ─── Rewrite 代理：把后端路由代理到 Railway，解决 Netlify 静态站点 404 ───
# 背景：前端 getApiBase() 在 Snippet injection 失效时会回退到 window.location.origin
#       （Netlify 域名），导致 /price.bundle.json 等请求发到 Netlify 静态站点返回 404。
#       后端路由 /config.json /version.json /price.bundle.json /stock.bundle.json /api/*
#       只在 Railway 注册（routes_public.py:42,90,104,119），Netlify 静态站点不存在这些文件。
# 策略：
#   - status = 200 表示 rewrite（透明代理），浏览器地址栏不变，不触发 CORS
#   - force = true 覆盖 Netlify 静态文件（即使根目录有同名文件也走代理）
#   - 自定义请求头（X-Company-Token / X-Stock-Key / Authorization）由 Netlify 透传
# 双保险：与 apps/lib/state.js 的 _readHardcodedProdApi() 延迟读取配合，
#         即使 Snippet injection 完全失效，rewrite 代理也能让 bundle 请求到达后端。
#
# 配置步骤：在 Netlify 后台 → Site settings → Environment variables 添加：
#   Key: BACKEND_URL
#   Value: https://你的后端域名.up.railway.app
# 详见 _DEPLOYMENT-STEPS.md 步骤 4.5

[[redirects]]
  from = "/config.json"
  to = "${BACKEND_URL}/config.json"
  status = 200
  force = true

[[redirects]]
  from = "/version.json"
  to = "${BACKEND_URL}/version.json"
  status = 200
  force = true

[[redirects]]
  from = "/price.bundle.json"
  to = "${BACKEND_URL}/price.bundle.json"
  status = 200
  force = true

[[redirects]]
  from = "/stock.bundle.json"
  to = "${BACKEND_URL}/stock.bundle.json"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "${BACKEND_URL}/api/:splat"
  status = 200
  force = true
